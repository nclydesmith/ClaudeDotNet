name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e28d97b33 # v4.3.0
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore dotnet/OpenClaude.sln

      - name: Build
        run: dotnet build dotnet/OpenClaude.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test dotnet/OpenClaude.sln --no-build --configuration Release --verbosity normal
